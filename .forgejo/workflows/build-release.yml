name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-linux:
    runs-on: codeberg-tiny
    steps:
      - uses: https://github.com/actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libgtk-3-dev libwayland-dev wayland-protocols \
            pkg-config python3-pip ninja-build

      - name: Install Conan
        run: pip install conan --break-system-packages

      - name: Detect Conan profile
        run: conan profile detect

      - name: Cache Conan packages
        uses: https://github.com/actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-linux-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-linux-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Build
        run: |
          cmake --preset conan-release
          cmake --build --preset conan-release -j$(nproc)

      - name: Package AppImage
        run: |
          cat > savemanager.desktop << 'EOF'
          [Desktop Entry]
          Name=SaveManager
          Exec=savemanager
          Icon=savemanager
          Type=Application
          Categories=Utility;
          EOF

          python3 -c "
          import struct, zlib, pathlib
          w = h = 256
          row = b'\x00' + bytes([201, 93, 56]) * w
          idat = zlib.compress(row * h)
          def chunk(tag, data):
              c = tag + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          png = (b'\x89PNG\r\n\x1a\n'
              + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              + chunk(b'IDAT', idat)
              + chunk(b'IEND', b''))
          pathlib.Path('savemanager.png').write_bytes(png)
          "

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage

          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/Release/savemanager \
            --desktop-file savemanager.desktop \
            --icon-file savemanager.png \
            --output appimage

      - uses: https://github.com/actions/upload-artifact@v4
        with:
          name: savemanager-linux
          path: SaveManager-x86_64.AppImage

  release:
    needs: [build-linux]
    runs-on: codeberg-tiny
    permissions:
      contents: write
    steps:
      - uses: https://github.com/actions/checkout@v4
      - uses: https://github.com/actions/download-artifact@v4

      - name: Rename artifact
        run: mv savemanager-linux/SaveManager-x86_64.AppImage SaveManager-Linux-x86_64.AppImage

      - name: Create Release
        run: |
          RELEASE_ID=$(curl -s -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/json" \
            "https://codeberg.org/api/v1/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\": \"${{ github.ref_name }}\", \"name\": \"${{ github.ref_name }}\"}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          curl -s -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "https://codeberg.org/api/v1/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=SaveManager-Linux-x86_64.AppImage" \
            --data-binary @SaveManager-Linux-x86_64.AppImage
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
