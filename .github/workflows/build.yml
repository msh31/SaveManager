name: Test Cross Platform build

on:
  push:
    branches: [ main ]
    tags: ['v*']
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/vcpkg/archives
          key: vcpkg-linux-${{ hashFiles('cmake.toml') }}
          restore-keys: vcpkg-linux-

      - name: Install X11 development libraries
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev

      - name: build_linux
        run: |
          cmake -B build
          cmake --build build -j$(nproc)

      - name: Package AppImage
        run: |
          # Create .desktop file
          cat > savemanager.desktop << 'EOF'
          [Desktop Entry]
          Name=SaveManager
          Exec=savemanager
          Icon=savemanager
          Type=Application
          Categories=Utility;
          EOF

          # Create a minimal placeholder icon
          python3 -c "
          import base64, pathlib
          pathlib.Path('savemanager.png').write_bytes(base64.b64decode(
              'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg=='
          ))
          "

          # Download linuxdeploy and appimage plugin
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage

          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/savemanager \
            --desktop-file savemanager.desktop \
            --icon-file savemanager.png \
            --output appimage

      - uses: actions/upload-artifact@v4
        with:
          name: savemanager-linux
          path: SaveManager-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\AppData\Local\vcpkg\archives
          key: vcpkg-windows-static-${{ hashFiles('cmake.toml') }}
          restore-keys: vcpkg-windows-static-

      - name: build_windows
        run: |
          cmake -B build -DVCPKG_TARGET_TRIPLET=x64-windows-static -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded
          cmake --build build --config Release
        env:
          VCPKG_ROOT: C:\vcpkg

      - uses: actions/upload-artifact@v4
        with:
          name: savemanager-windows
          path: build/Release/savemanager.exe

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            savemanager-linux/SaveManager-x86_64.AppImage \
            savemanager-windows/savemanager.exe \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
