name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libgtk-3-dev libwayland-dev wayland-protocols \
            pkg-config python3-pip ninja-build

      - name: Install Conan
        run: pip install conan --break-system-packages

      - name: Detect Conan profile
        run: conan profile detect

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-linux-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-linux-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Build
        run: |
          cmake --preset conan-release
          cmake --build --preset conan-release -j$(nproc)

      - name: Package AppImage
        run: |
          cat > savemanager.desktop << 'EOF'
          [Desktop Entry]
          Name=SaveManager
          Exec=savemanager
          Icon=savemanager
          Type=Application
          Categories=Utility;
          EOF

          python3 -c "
          import struct, zlib, pathlib
          w = h = 256
          row = b'\x00' + bytes([201, 93, 56]) * w
          idat = zlib.compress(row * h)
          def chunk(tag, data):
              c = tag + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          png = (b'\x89PNG\r\n\x1a\n'
              + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              + chunk(b'IDAT', idat)
              + chunk(b'IEND', b''))
          pathlib.Path('savemanager.png').write_bytes(png)
          "

          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-appimage/releases/download/continuous/linuxdeploy-plugin-appimage-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-appimage-x86_64.AppImage

          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/Release/savemanager \
            --desktop-file savemanager.desktop \
            --icon-file savemanager.png \
            --output appimage

      - uses: actions/upload-artifact@v4
        with:
          name: savemanager-linux
          path: SaveManager-x86_64.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Conan
        run: pip install conan

      - name: Detect Conan profile
        run: conan profile detect

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\.conan2\p
          key: conan-windows-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-windows-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --preset conan-release
          cmake --build --preset conan-release

      - uses: actions/upload-artifact@v4
        with:
          name: savemanager-windows
          path: build/Release/savemanager.exe

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: brew install ninja pkg-config

      - name: Install Conan
        run: pip3 install conan --break-system-packages

      - name: Detect Conan profile
        run: conan profile detect

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-macos-arm64-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-macos-arm64-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Build
        run: |
          cmake --preset conan-release
          cmake --build --preset conan-release -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: savemanager-macos-arm64
          path: build/Release/savemanager

  build-macos-x86:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: brew install ninja pkg-config

      - name: Install Conan
        run: pip3 install conan --break-system-packages

      - name: Detect Conan profile
        run: conan profile detect

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2/p
          key: conan-macos-x86-${{ hashFiles('conanfile.py') }}
          restore-keys: conan-macos-x86-

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Build
        run: |
          cmake --preset conan-release
          cmake --build --preset conan-release -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: savemanager-macos-x86
          path: build/Release/savemanager

  release:
    needs: [build-linux, build-windows, build-macos-arm64, build-macos-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4

      - name: Rename artifacts
        run: |
          mv savemanager-linux/SaveManager-x86_64.AppImage SaveManager-Linux-x86_64.AppImage
          mv savemanager-windows/savemanager.exe SaveManager-Windows-x86_64.exe
          mv savemanager-macos-arm64/savemanager SaveManager-macOS-arm64
          mv savemanager-macos-x86/savemanager SaveManager-macOS-x86_64

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            SaveManager-Linux-x86_64.AppImage \
            SaveManager-Windows-x86_64.exe \
            SaveManager-macOS-arm64 \
            SaveManager-macOS-x86_64 \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
