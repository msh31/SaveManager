name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    uses: ./.github/workflows/build.yml
    with:
      package: true

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8

      - name: Rename artifacts
        run: |
          mv savemanager-linux/SaveManager-x86_64.AppImage SaveManager-Linux-x86_64.AppImage
          mv savemanager-windows/savemanager.exe SaveManager-Windows-x86_64.exe
          mv savemanager-macos-arm64/SaveManager-macOS-arm64.zip SaveManager-macOS-arm64.zip

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            SaveManager-Linux-x86_64.AppImage \
            SaveManager-Windows-x86_64.exe \
            SaveManager-macOS-arm64.zip \
            --title "${{ github.ref_name }}" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
